name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Esto te permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout del Código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar Dependencias
        run: npm ci

      - name: 🔒 Verificar Compliance
        run: npm audit

      - name: 🧪 Ejecutar Pruebas Automatizadas
        run: npm test
